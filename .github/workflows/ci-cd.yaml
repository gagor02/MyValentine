name: CI/CD Pipeline - Trabajo Final

on:
  push:
    branches:
      - main

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Descargar código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm install

      - name: 🧪 Ejecutar Pruebas (Unit Tests)
        run: npm run test

      - name: 🐳 Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: 🚀 Build y Push de la Imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: gagor0202/myvalentine:latest, gagor0202/myvalentine:${{ github.run_number }}

      # --- ¡AQUÍ EMPIEZA LA MAGIA PRO! ---
      - name: 💻 Desplegar Automáticamente en el Servidor
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            echo "Conectado al servidor. Actualizando a la versión ${{ github.run_number }}..."
            # ESTA ES LA LÍNEA MÁGICA: Obliga a Kubernetes a usar la imagen exacta que se acaba de crear
            kubectl set image deployment/react-app-deployment myvalentine=gagor0202/myvalentine:${{ github.run_number }}
            kubectl rollout status deployment/react-app-deployment
            echo "¡Despliegue exitoso, Capitán!"